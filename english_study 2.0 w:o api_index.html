<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pattern Master 30</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .mic-active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const patterns = [
            { id: 1, part: "PART 1", pattern: "I'm trying to ~", desc: "~하려고 노력 중이야", 
              quizzes: [
                  { kr: "자려고 노력 중이야.", en: "I'm trying to sleep." },
                  { kr: "내 일에 집중하려고 노력 중이야.", en: "I'm trying to focus on my work." },
                  { kr: "내 영어를 고치려고 노력 중이야.", en: "I'm trying to fix my English." }
              ] 
            },
            { id: 2, part: "PART 1", pattern: "I'm supposed to ~", desc: "~하기로 되어 있어", 
              quizzes: [
                  { kr: "나 지금 거기 가 있어야 해.", en: "I'm supposed to be there now." },
                  { kr: "7시에 친구를 만나기로 되어 있어.", en: "I'm supposed to meet my friend at 7." },
                  { kr: "내일까지 이걸 끝내기로 되어 있어.", en: "I'm supposed to finish this by tomorrow." }
              ] 
            },
            { id: 3, part: "PART 1", pattern: "I was about to ~", desc: "막 ~하려던 참이었어", 
              quizzes: [
                  { kr: "너한테 막 전화하려던 참이었어.", en: "I was about to call you." },
                  { kr: "막 나가려던 참이었어.", en: "I was about to go out." },
                  { kr: "똑같은 말을 하려던 참이었어.", en: "I was about to say the same thing." }
              ] 
            },
            { id: 4, part: "PART 1", pattern: "I'm here to ~", desc: "~하러 왔어", 
              quizzes: [
                  { kr: "너 도와주러 왔어.", en: "I'm here to help you." },
                  { kr: "매니저를 만나러 왔어.", en: "I'm here to see the manager." },
                  { kr: "주문한 거 찾으러 왔어.", en: "I'm here to pick up my order." }
              ] 
            },
            { id: 5, part: "PART 1", pattern: "I've been ~ing", desc: "계속 ~해오고 있어", 
              quizzes: [
                  { kr: "계속 널 기다리고 있었어.", en: "I've been waiting for you." },
                  { kr: "하루 종일 영어 공부를 하고 있어.", en: "I've been studying English all day." },
                  { kr: "네 생각을 하고 있었어.", en: "I've been thinking about you." }
              ] 
            },
            { id: 6, part: "PART 1", pattern: "Let me ~", desc: "내가 ~할게요 / 하게 해줘", 
              quizzes: [
                  { kr: "내가 확인해 볼게.", en: "Let me check." },
                  { kr: "도움이 필요하면 알려줘.", en: "Let me know if you need help." },
                  { kr: "무슨 일이 있었는지 설명해 줄게.", en: "Let me explain what happened." }
              ] 
            },
            { id: 7, part: "PART 1", pattern: "I'd like to ~", desc: "~하고 싶어요", 
              quizzes: [
                  { kr: "지금 주문하고 싶어요.", en: "I'd like to order now." },
                  { kr: "예약을 하고 싶어요.", en: "I'd like to make a reservation." },
                  { kr: "질문을 하나 하고 싶어요.", en: "I'd like to ask a question." }
              ] 
            },
            { id: 8, part: "PART 2", pattern: "Can I get ~?", desc: "~ 주시겠어요?", 
              quizzes: [
                  { kr: "커피 한 잔 주실래요?", en: "Can I get a coffee?" },
                  { kr: "환불받을 수 있을까요?", en: "Can I get a refund?" },
                  { kr: "냅킨 좀 더 주시겠어요?", en: "Can I get some extra napkins?" }
              ] 
            },
            { id: 9, part: "PART 2", pattern: "Can you ~?", desc: "~해 줄 수 있어?", 
              quizzes: [
                  { kr: "나 좀 도와줄 수 있어?", en: "Can you help me?" },
                  { kr: "길을 좀 알려줄 수 있어?", en: "Can you tell me the way?" },
                  { kr: "좀 더 천천히 말씀해 주시겠어요?", en: "Can you speak more slowly?" }
              ] 
            },
            { id: 10, part: "PART 2", pattern: "Do you mind ~ing?", desc: "~하는 거 괜찮을까요?", 
              quizzes: [
                  { kr: "창문 좀 여는 거 괜찮을까요?", en: "Do you mind opening the window?" },
                  { kr: "여기 앉아도 괜찮을까요?", en: "Do you mind if I sit here?" },
                  { kr: "잠시만 기다려 주시는 거 괜찮을까요?", en: "Do you mind waiting for a second?" }
              ] 
            },
            { id: 11, part: "PART 2", pattern: "I was wondering if ~", desc: "혹시 ~할 수 있나 해서요", 
              quizzes: [
                  { kr: "혹시 도와줄 수 있나 해서요.", en: "I was wondering if you could help." },
                  { kr: "오늘 밤에 시간 되나 해서요.", en: "I was wondering if you're free tonight." },
                  { kr: "이것 좀 빌릴 수 있나 해서요.", en: "I was wondering if I could borrow this." }
              ] 
            },
            { id: 12, part: "PART 2", pattern: "I need you to ~", desc: "네가 ~해줬으면 좋겠어", 
              quizzes: [
                  { kr: "조금만 기다려 줬으면 해.", en: "I need you to wait." },
                  { kr: "여기에 서명해 줬으면 좋겠어.", en: "I need you to sign here." },
                  { kr: "나한테 솔직해졌으면 좋겠어.", en: "I need you to be honest with me." }
              ] 
            },
            { id: 13, part: "PART 2", pattern: "I just wanted to ~", desc: "그냥 ~하고 싶었어", 
              quizzes: [
                  { kr: "그냥 고맙다고 말하고 싶었어.", en: "I just wanted to say thank you." },
                  { kr: "그냥 안부 좀 확인하고 싶었어.", en: "I just wanted to check in." },
                  { kr: "네가 어떻게 지내는지 보고 싶었어.", en: "I just wanted to see how you are." }
              ] 
            },
            { id: 14, part: "PART 3", pattern: "I'm not sure if ~", desc: "~인지 잘 모르겠어", 
              quizzes: [
                  { kr: "이게 되는지 잘 모르겠어.", en: "I'm not sure if it works." },
                  { kr: "그가 오고 있는지 잘 모르겠어.", en: "I'm not sure if he's coming." },
                  { kr: "내가 갈 수 있을지 잘 모르겠어.", en: "I'm not sure if I can make it." }
              ] 
            },
            { id: 15, part: "PART 3", pattern: "I don't think ~", desc: "~인 것 같지 않아", 
              quizzes: [
                  { kr: "그건 사실이 아닌 것 같아.", en: "I don't think that's true." },
                  { kr: "내가 할 수 있을 것 같지 않아.", en: "I don't think I can do it." },
                  { kr: "우리 전에 만난 적이 없는 것 같아요.", en: "I don't think we've met before." }
              ] 
            },
            { id: 16, part: "PART 3", pattern: "I think you should ~", desc: "너 ~하는 게 좋을 것 같아", 
              quizzes: [
                  { kr: "그거 한번 해보는 게 좋을 것 같아.", en: "I think you should try it." },
                  { kr: "좀 쉬는 게 좋을 것 같아.", en: "I think you should take a rest." },
                  { kr: "그녀와 이야기해 보는 게 좋을 것 같아.", en: "I think you should talk to her." }
              ] 
            },
            { id: 17, part: "PART 3", pattern: "It feels like ~", desc: "~처럼 느껴져", 
              quizzes: [
                  { kr: "여름처럼 느껴져.", en: "It feels like summer." },
                  { kr: "꿈처럼 느껴져.", en: "It feels like a dream." },
                  { kr: "여기 전에 와본 것 같은 기분이야.", en: "It feels like I've been here before." }
              ] 
            },
            { id: 18, part: "PART 3", pattern: "It looks like ~", desc: "~처럼 보여", 
              quizzes: [
                  { kr: "비 올 것 같아.", en: "It looks like rain." },
                  { kr: "좋은 기회인 것 같아.", en: "It looks like a great opportunity." },
                  { kr: "그들은 바빠 보여.", en: "It looks like they're busy." }
              ] 
            },
            { id: 19, part: "PART 3", pattern: "It sounds like ~", desc: "~처럼 들려", 
              quizzes: [
                  { kr: "그거 좋은 생각 같네.", en: "It sounds like a plan." },
                  { kr: "아주 재미있을 것 같아.", en: "It sounds like a lot of fun." },
                  { kr: "힘든 시간을 보내고 있는 것 같네.", en: "It sounds like you're having a hard time." }
              ] 
            },
            { id: 20, part: "PART 4", pattern: "There is / There are ~", desc: "~가 있어", 
              quizzes: [
                  { kr: "문제가 하나 있어.", en: "There is a problem." },
                  { kr: "그건 의심의 여지가 없어.", en: "There is no doubt about it." },
                  { kr: "할 일이 많아.", en: "There are many things to do." }
              ] 
            },
            { id: 21, part: "PART 4", pattern: "The thing is ~", desc: "문제는/사실은 ~야", 
              quizzes: [
                  { kr: "실은 내가 오늘 좀 바빠.", en: "The thing is I'm busy today." },
                  { kr: "사실은 내가 돈이 충분하지 않아.", en: "The thing is I don't have enough money." },
                  { kr: "문제는 너무 늦었다는 거야.", en: "The thing is it's too late." }
              ] 
            },
            { id: 22, part: "PART 4", pattern: "As far as I know ~", desc: "내가 아는 바로는 ~", 
              quizzes: [
                  { kr: "내가 알기로 그는 떠났어.", en: "As far as I know, he left." },
                  { kr: "내가 알기로는 그거 무료야.", en: "As far as I know, it's free." },
                  { kr: "내가 보기에는 괜찮아.", en: "As far as I'm concerned, it's fine." }
              ] 
            },
            { id: 23, part: "PART 4", pattern: "You don't have to ~", desc: "~할 필요 없어", 
              quizzes: [
                  { kr: "걱정할 필요 없어.", en: "You don't have to worry." },
                  { kr: "서두를 필요 없어.", en: "You don't have to hurry." },
                  { kr: "사과할 필요 없어.", en: "You don't have to apologize." }
              ] 
            },
            { id: 24, part: "PART 4", pattern: "You might want to ~", desc: "~하는 게 좋을지도 몰라", 
              quizzes: [
                  { kr: "다시 확인해 보는 게 좋을 것 같아.", en: "You might want to check again." },
                  { kr: "이걸 한번 해보는 게 좋을 거야.", en: "You might want to try this one." },
                  { kr: "그에게 먼저 전화해 보는 게 좋을지도 몰라.", en: "You might want to call him first." }
              ] 
            },
            { id: 25, part: "PART 4", pattern: "It depends on ~", desc: "~에 따라 달라", 
              quizzes: [
                  { kr: "그건 상황에 따라 달라.", en: "It depends on the situation." },
                  { kr: "그건 날씨에 따라 달라.", en: "It depends on the weather." },
                  { kr: "그건 네가 얼마나 간절한지에 달려 있어.", en: "It depends on how much you want it." }
              ] 
            },
            { id: 26, part: "PART 4", pattern: "I'll let you know ~", desc: "알려줄게", 
              quizzes: [
                  { kr: "나중에 알려줄게.", en: "I'll let you know later." },
                  { kr: "결과를 알려줄게.", en: "I'll let you know the result." },
                  { kr: "도착하자마자 알려줄게.", en: "I'll let you know as soon as I arrive." }
              ] 
            },
            { id: 27, part: "PART 4", pattern: "I didn't mean to ~", desc: "~하려던 건 아니었어", 
              quizzes: [
                  { kr: "널 다치게 하려던 건 아니었어.", en: "I didn't mean to hurt you." },
                  { kr: "방해하려던 건 아니었어.", en: "I didn't mean to interrupt." },
                  { kr: "널 계속 기다리게 하려던 건 아니었어.", en: "I didn't mean to keep you waiting." }
              ] 
            },
            { id: 28, part: "PART 4", pattern: "I can't wait to ~", desc: "~하는 게 너무 기대돼", 
              quizzes: [
                  { kr: "널 만나는 게 너무 기대돼.", en: "I can't wait to see you." },
                  { kr: "새 직장을 시작하는 게 너무 기대돼.", en: "I can't wait to start my new job." },
                  { kr: "휴가 가는 게 너무 기대돼.", en: "I can't wait to go on vacation." }
              ] 
            },
            { id: 29, part: "PART 4", pattern: "That's why ~", desc: "그래서 ~한 거야", 
              quizzes: [
                  { kr: "그래서 내가 일찍 나간 거야.", en: "That's why I left early." },
                  { kr: "그래서 내가 여기 있는 거야.", en: "That's why I'm here." },
                  { kr: "그래서 내가 이곳을 사랑하는 거야.", en: "That's why I love this place." }
              ] 
            },
            { id: 30, part: "PART 4", pattern: "That's what I mean", desc: "내 말이 바로 그 말이야", 
              quizzes: [
                  { kr: "그러니까 그게 내가 하고 싶은 말이야.", en: "That's what I mean." },
                  { kr: "정확해, 내 말이 그 말이야!", en: "Exactly, that's what I mean!" },
                  { kr: "내 말이 무슨 뜻인지 알지.", en: "You know what I mean." }
              ] 
            }
        ];

        function App() {
            const [pIndex, setPIndex] = useState(0); // 패턴 인덱스
            const [qIndex, setQIndex] = useState(0); // 예문 인덱스
            const [userInput, setUserInput] = useState("");
            const [showAnswer, setShowAnswer] = useState(false);
            const [isListening, setIsListening] = useState(false);

            const currentPattern = patterns[pIndex];
            const currentQuiz = currentPattern.quizzes[qIndex];

            // 영어 목소리로 읽어주기
            const playSound = (text) => {
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(text);
                uttr.lang = 'en-US';
                uttr.rate = 0.9;
                window.speechSynthesis.speak(uttr);
            };

            // 음성 인식 (STT)
            const startListening = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return alert("브라우저가 음성 인식을 지원하지 않습니다.");
                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.onstart = () => setIsListening(true);
                recognition.onend = () => setIsListening(false);
                recognition.onresult = (e) => setUserInput(e.results[0][0].transcript);
                recognition.start();
            };

            const handleCheck = () => {
                setShowAnswer(true);
                playSound(currentQuiz.en);
            };

            const handleNext = () => {
                setShowAnswer(false);
                setUserInput("");
                
                if (qIndex < 2) {
                    setQIndex(qIndex + 1); // 다음 예문으로
                } else {
                    setQIndex(0);
                    setPIndex((pIndex + 1) % patterns.length); // 다음 패턴으로
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-6 pb-20">
                    <header className="py-6 text-center">
                        <h1 className="text-2xl font-black text-gray-800 tracking-tighter italic">PATTERN MASTER <span className="text-blue-600">30</span></h1>
                        <div className="w-full bg-gray-200 h-1.5 mt-4 rounded-full overflow-hidden">
                            <div 
                                className="bg-blue-600 h-full transition-all duration-500" 
                                style={{width: `${((pIndex * 3 + qIndex + 1) / 90) * 100}%`}}
                            ></div>
                        </div>
                        <p className="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-widest">
                            Progress: {pIndex * 3 + qIndex + 1} / 90 Sentences
                        </p>
                    </header>

                    <main className="flex-grow">
                        {/* 패턴 정보 카드 */}
                        <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 mb-6">
                            <div className="flex justify-between items-start mb-2">
                                <span className="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-full">{currentPattern.part}</span>
                                <span className="text-gray-300 text-[10px] font-bold tracking-tighter">ID: {currentPattern.id}</span>
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 tracking-tight">{currentPattern.pattern}</h2>
                            <p className="text-gray-500 text-sm mt-1">{currentPattern.desc}</p>
                        </div>

                        {/* 퀴즈 문제 */}
                        <div className="bg-blue-600 rounded-3xl p-8 mb-6 text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                            <div className="relative z-10 text-center">
                                <p className="text-blue-200 text-xs font-bold uppercase mb-2 tracking-widest">Translate this</p>
                                <h3 className="text-xl font-bold leading-tight">"{currentQuiz.kr}"</h3>
                            </div>
                            <div className="absolute top-[-20px] right-[-20px] w-24 h-24 bg-white/10 rounded-full"></div>
                        </div>

                        {/* 입력 창 */}
                        <div className="relative mb-6">
                            <textarea
                                className="w-full h-32 p-6 rounded-3xl bg-white shadow-sm border-2 border-transparent focus:border-blue-400 outline-none transition resize-none text-lg font-medium"
                                placeholder="영어로 말하거나 입력하세요..."
                                value={userInput}
                                onChange={(e) => setUserInput(e.target.value)}
                            />
                            <button 
                                onClick={startListening}
                                className={`absolute bottom-4 right-4 w-12 h-12 rounded-full flex items-center justify-center transition-all shadow-md ${
                                    isListening ? 'bg-red-500 text-white mic-active' : 'bg-gray-100 text-gray-400 hover:text-blue-600'
                                }`}
                            >
                                <i className={`fas ${isListening ? 'fa-stop' : 'fa-microphone'} text-lg`}></i>
                            </button>
                        </div>

                        {/* 결과 확인 섹션 */}
                        {showAnswer && (
                            <div className="bg-green-50 rounded-3xl p-6 mb-6 border-2 border-green-100 animate-in fade-in zoom-in duration-300">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-green-600 font-bold text-xs uppercase tracking-widest">Correct Answer</span>
                                    <button onClick={() => playSound(currentQuiz.en)} className="text-green-600 hover:scale-110 transition">
                                        <i className="fas fa-volume-up text-lg"></i>
                                    </button>
                                </div>
                                <p className="text-xl font-bold text-gray-800 leading-tight mb-2">
                                    {currentQuiz.en}
                                </p>
                                <div className="mt-4 pt-4 border-t border-green-100">
                                    <p className="text-xs text-green-700 font-medium">
                                        💡 본인의 문장과 비교해보세요! 같지 않아도 의미가 통하면 정답입니다.
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 고정 하단 버튼 */}
                    <div className="fixed bottom-6 left-6 right-6 max-w-md mx-auto">
                        {!showAnswer ? (
                            <button
                                onClick={handleCheck}
                                disabled={!userInput}
                                className="w-full bg-gray-900 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 disabled:bg-gray-200 disabled:text-gray-400 transition-all uppercase tracking-widest"
                            >
                                Check Answer
                            </button>
                        ) : (
                            <button
                                onClick={handleNext}
                                className="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 hover:bg-blue-700 transition-all uppercase tracking-widest flex items-center justify-center gap-2"
                            >
                                Next Sentence <i className="fas fa-arrow-right"></i>
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
