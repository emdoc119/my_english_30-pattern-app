<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pattern Master 30</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #F8FAFC; overflow: hidden; margin: 0; }
        .font-heading { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .mic-active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { transform: scale(1); } }
        .page-transition { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const patterns = [
            { id: 1, part: "PART 1", category: "현재의 행동 및 의도", pattern: "I'm trying to ~", desc: "~하려고 노력 중이야", quizzes: [{ kr: "자려고 노력 중이야.", en: "I'm trying to sleep." }, { kr: "내 일에 집중하려고 노력 중이야.", en: "I'm trying to focus on my work." }, { kr: "내 영어를 고치려고 노력 중이야.", en: "I'm trying to fix my English." }] },
            { id: 2, part: "PART 1", category: "현재의 행동 및 의도", pattern: "I'm supposed to ~", desc: "~하기로 되어 있어", quizzes: [{ kr: "나 지금 거기 가 있어야 해.", en: "I'm supposed to be there now." }, { kr: "7시에 친구를 만나기로 되어 있어.", en: "I'm supposed to meet my friend at 7." }, { kr: "내일까지 이걸 끝내기로 되어 있어.", en: "I'm supposed to finish this by tomorrow." }] },
            { id: 3, part: "PART 1", category: "현재의 행동 및 의도", pattern: "I was about to ~", desc: "막 ~하려던 참이었어", quizzes: [{ kr: "너한테 막 전화하려던 참이었어.", en: "I was about to call you." }, { kr: "막 나가려던 참이었어.", en: "I was about to go out." }, { kr: "똑같은 말을 하려던 참이었어.", en: "I was about to say the same thing." }] },
            { id: 4, part: "PART 1", category: "현재의 행동 및 의도", pattern: "I'm here to ~", desc: "~하러 왔어", quizzes: [{ kr: "너 도와주러 왔어.", en: "I'm here to help you." }, { kr: "매니저를 만나러 왔어.", en: "I'm here to see the manager." }, { kr: "주문한 거 찾으러 왔어.", en: "I'm here to pick up my order." }] },
            { id: 5, part: "PART 1", category: "현재의 행동 및 의도", pattern: "I've been ~ing", desc: "계속 ~해오고 있어", quizzes: [{ kr: "계속 널 기다리고 있었어.", en: "I've been waiting for you." }, { kr: "하루 종일 영어 공부를 하고 있어.", en: "I've been studying English all day." }, { kr: "네 생각을 하고 있었어.", en: "I've been thinking about you." }] },
            { id: 6, part: "PART 1", category: "현재의 행동 및 의도", pattern: "Let me ~", desc: "내가 ~할게요 / 하게 해줘", quizzes: [{ kr: "내가 확인해 볼게.", en: "Let me check." }, { kr: "도움이 필요하면 알려줘.", en: "Let me know if you need help." }, { kr: "무슨 일이 있었는지 설명해 줄게.", en: "Let me explain what happened." }] },
            { id: 7, part: "PART 1", category: "현재의 행동 및 의도", pattern: "I'd like to ~", desc: "~하고 싶어요", quizzes: [{ kr: "지금 주문하고 싶어요.", en: "I'd like to order now." }, { kr: "예약을 하고 싶어요.", en: "I'd like to make a reservation." }, { kr: "질문을 하나 하고 싶어요.", en: "I'd like to ask a question." }] },
            { id: 8, part: "PART 2", category: "요청 및 정중한 표현", pattern: "Can I get ~?", desc: "~ 주시겠어요?", quizzes: [{ kr: "커피 한 잔 주실래요?", en: "Can I get a coffee?" }, { kr: "환불받을 수 있을까요?", en: "Can I get a refund?" }, { kr: "냅킨 좀 더 주시겠어요?", en: "Can I get some extra napkins?" }] },
            { id: 9, part: "PART 2", category: "요청 및 정중한 표현", pattern: "Can you ~?", desc: "~해 줄 수 있어?", quizzes: [{ kr: "나 좀 도와줄 수 있어?", en: "Can you help me?" }, { kr: "길을 좀 알려줄 수 있어?", en: "Can you tell me the way?" }, { kr: "좀 더 천천히 말씀해 주시겠어요?", en: "Can you speak more slowly?" }] },
            { id: 10, part: "PART 2", category: "요청 및 정중한 표현", pattern: "Do you mind ~ing?", desc: "~하는 거 괜찮을까요?", quizzes: [{ kr: "창문 좀 여는 거 괜찮을까요?", en: "Do you mind opening the window?" }, { kr: "여기 앉아도 괜찮을까요?", en: "Do you mind if I sit here?" }, { kr: "잠시만 기다려 주시는 거 괜찮을까요?", en: "Do you mind waiting for a second?" }] },
            { id: 11, part: "PART 2", category: "요청 및 정중한 표현", pattern: "I was wondering if ~", desc: "혹시 ~할 수 있나 해서요", quizzes: [{ kr: "혹시 도와줄 수 있나 해서요.", en: "I was wondering if you could help." }, { kr: "오늘 밤에 시간 되나 해서요.", en: "I was wondering if you're free tonight." }, { kr: "이것 좀 빌릴 수 있나 해서요.", en: "I was wondering if I could borrow this." }] },
            { id: 12, part: "PART 2", category: "요청 및 정중한 표현", pattern: "I need you to ~", desc: "네가 ~해줬으면 좋겠어", quizzes: [{ kr: "조금만 기다려 줬으면 해.", en: "I need you to wait." }, { kr: "여기에 서명해 줬으면 좋겠어.", en: "I need you to sign here." }, { kr: "나한테 솔직해졌으면 좋겠어.", en: "I need you to be honest with me." }] },
            { id: 13, part: "PART 2", category: "요청 및 정중한 표현", pattern: "I just wanted to ~", desc: "그냥 ~하고 싶었어", quizzes: [{ kr: "그냥 고맙다고 말하고 싶었어.", en: "I just wanted to say thank you." }, { kr: "그냥 안부 좀 확인하고 싶었어.", en: "I just wanted to check in." }, { kr: "네가 어떻게 지내는지 보고 싶었어.", en: "I just wanted to see how you are." }] },
            { id: 14, part: "PART 3", category: "의견, 판단 및 감각", pattern: "I'm not sure if ~", desc: "~인지 잘 모르겠어", quizzes: [{ kr: "이게 되는지 잘 모르겠어.", en: "I'm not sure if it works." }, { kr: "그가 오고 있는지 잘 모르겠어.", en: "I'm not sure if he's coming." }, { kr: "내가 갈 수 있을지 잘 모르겠어.", en: "I'm not sure if I can make it." }] },
            { id: 15, part: "PART 3", category: "의견, 판단 및 감각", pattern: "I don't think ~", desc: "~인 것 같지 않아", quizzes: [{ kr: "그건 사실이 아닌 것 같아.", en: "I don't think that's true." }, { kr: "내가 할 수 있을 것 같지 않아.", en: "I don't think I can do it." }, { kr: "우리 전에 만난 적이 없는 것 같아요.", en: "I don't think we've met before." }] },
            { id: 16, part: "PART 3", category: "의견, 판단 및 감각", pattern: "I think you should ~", desc: "너 ~하는 게 좋을 것 같아", quizzes: [{ kr: "그거 한번 해보는 게 좋을 것 같아.", en: "I think you should try it." }, { kr: "좀 쉬는 게 좋을 것 같아.", en: "I think you should take a rest." }, { kr: "그녀와 이야기해 보는 게 좋을 것 같아.", en: "I think you should talk to her." }] },
            { id: 17, part: "PART 3", category: "의견, 판단 및 감각", pattern: "It feels like ~", desc: "~처럼 느껴져", quizzes: [{ kr: "여름처럼 느껴져.", en: "It feels like summer." }, { kr: "꿈처럼 느껴져.", en: "It feels like a dream." }, { kr: "여기 전에 와본 것 같은 기분이야.", en: "It feels like I've been here before." }] },
            { id: 18, part: "PART 3", category: "의견, 판단 및 감각", pattern: "It looks like ~", desc: "~처럼 보여", quizzes: [{ kr: "비 올 것 같아.", en: "It looks like rain." }, { kr: "좋은 기회인 것 같아.", en: "It looks like a great opportunity." }, { kr: "그들은 바빠 보여.", en: "It looks like they're busy." }] },
            { id: 19, part: "PART 3", category: "의견, 판단 및 감각", pattern: "It sounds like ~", desc: "~처럼 들려", quizzes: [{ kr: "그거 좋은 생각 같네.", en: "It sounds like a plan." }, { kr: "아주 재미있을 것 같아.", en: "It sounds like a lot of fun." }, { kr: "힘든 시간을 보내고 있는 것 같네.", en: "It sounds like you're having a hard time." }] },
            { id: 20, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "There is / There are ~", desc: "~가 있어", quizzes: [{ kr: "문제가 하나 있어.", en: "There is a problem." }, { kr: "그건 의심의 여지가 없어.", en: "There is no doubt about it." }, { kr: "할 일이 많아.", en: "There are many things to do." }] },
            { id: 21, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "The thing is ~", desc: "문제는/사실은 ~야", quizzes: [{ kr: "실은 내가 오늘 좀 바빠.", en: "The thing is I'm busy today." }, { kr: "사실은 내가 돈이 충분하지 않아.", en: "The thing is I don't have enough money." }, { kr: "문제는 너무 늦었다는 거야.", en: "The thing is it's too late." }] },
            { id: 22, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "As far as I know ~", desc: "내가 아는 바로는 ~", quizzes: [{ kr: "내가 알기로 그는 떠났어.", en: "As far as I know, he left." }, { kr: "내가 알기로는 그거 무료야.", en: "As far as I know, it's free." }, { kr: "내가 보기에는 괜찮아.", en: "As far as I'm concerned, it's fine." }] },
            { id: 23, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "You don't have to ~", desc: "~할 필요 없어", quizzes: [{ kr: "걱정할 필요 없어.", en: "You don't have to worry." }, { kr: "서두를 필요 없어.", en: "You don't have to hurry." }, { kr: "사과할 필요 없어.", en: "You don't have to apologize." }] },
            { id: 24, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "You might want to ~", desc: "~하는 게 좋을지도 몰라", quizzes: [{ kr: "다시 확인해 보는 게 좋을 것 같아.", en: "You might want to check again." }, { kr: "이걸 한번 해보는 게 좋을 거야.", en: "You might want to try this one." }, { kr: "그에게 먼저 전화해 보는 게 좋을지도 몰라.", en: "You might want to call him first." }] },
            { id: 25, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "It depends on ~", desc: "~에 따라 달라", quizzes: [{ kr: "그건 상황에 따라 달라.", en: "It depends on the situation." }, { kr: "그건 날씨에 따라 달라.", en: "It depends on the weather." }, { kr: "그건 네가 얼마나 간절한지에 달려 있어.", en: "It depends on how much you want it." }] },
            { id: 26, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "I'll let you know ~", desc: "알려줄게", quizzes: [{ kr: "나중에 알려줄게.", en: "I'll let you know later." }, { kr: "결과를 알려줄게.", en: "I'll let you know the result." }, { kr: "도착하자마자 알려줄게.", en: "I'll let you know as soon as I arrive." }] },
            { id: 27, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "I didn't mean to ~", desc: "~하려던 건 아니었어", quizzes: [{ kr: "널 다치게 하려던 건 아니었어.", en: "I didn't mean to hurt you." }, { kr: "방해하려던 건 아니었어.", en: "I didn't mean to interrupt." }, { kr: "널 계속 기다리게 하려던 건 아니었어.", en: "I didn't mean to keep you waiting." }] },
            { id: 28, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "I can't wait to ~", desc: "~하는 게 너무 기대돼", quizzes: [{ kr: "널 만나는 게 너무 기대돼.", en: "I can't wait to see you." }, { kr: "새 직장을 시작하는 게 너무 기대돼.", en: "I can't wait to start my new job." }, { kr: "휴가 가는 게 너무 기대돼.", en: "I can't wait to go on vacation." }] },
            { id: 29, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "That's why ~", desc: "그래서 ~한 거야", quizzes: [{ kr: "그래서 내가 일찍 나간 거야.", en: "That's why I left early." }, { kr: "그래서 내가 여기 있는 거야.", en: "That's why I'm here." }, { kr: "그래서 내가 이곳을 사랑하는 거야.", en: "That's why I love this place." }] },
            { id: 30, part: "PART 4", category: "상황 설명 및 논리 연결", pattern: "That's what I mean", desc: "내 말이 바로 그 말이야", quizzes: [{ kr: "그러니까 그게 내가 하고 싶은 말이야.", en: "That's what I mean." }, { kr: "정확해, 내 말이 그 말이야!", en: "Exactly, that's what I mean!" }, { kr: "내 말이 무슨 뜻인지 알지.", en: "You know what I mean." }] }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function App() {
            const [view, setView] = useState('HOME');
            const [currentQuizzes, setCurrentQuizzes] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userInput, setUserInput] = useState("");
            const [showAnswer, setShowAnswer] = useState(false);
            const [isListening, setIsListening] = useState(false);

            // 여성 목소리 찾기 및 발화 함수
            const speak = (text, lang = 'en-US') => {
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                
                // 여성 목소리 키워드 필터링 (Google US English, Samantha, Microsoft Zira 등)
                const femaleVoice = voices.find(v => 
                    v.lang.startsWith(lang) && 
                    (v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Moira'))
                );
                
                if (femaleVoice) uttr.voice = femaleVoice;
                uttr.lang = lang;
                uttr.rate = 0.95;
                window.speechSynthesis.speak(uttr);
            };

            const startListening = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return alert("Speech recognition not supported");
                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.onstart = () => setIsListening(true);
                recognition.onend = () => setIsListening(false);
                recognition.onresult = (e) => setUserInput(e.results[0][0].transcript);
                recognition.start();
            };

            const handleMenuClick = (type, label) => {
                speak(label, 'en-US');
                if (type === 'ALL') {
                    const all = patterns.flatMap(p => p.quizzes.map(q => ({ ...p, ...q })));
                    setCurrentQuizzes(all);
                    setCurrentIndex(0);
                    setView('STUDY');
                } else if (type === 'PART_MENU') {
                    setView('PART_SELECT');
                } else if (type === 'RANDOM') {
                    const all = patterns.flatMap(p => p.quizzes.map(q => ({ ...p, ...q })));
                    setCurrentQuizzes(shuffleArray(all));
                    setCurrentIndex(0);
                    setView('TEST');
                }
            };

            const startPartStudy = (partName, label) => {
                speak(label, 'en-US');
                const filtered = patterns
                    .filter(p => p.part === partName)
                    .flatMap(p => p.quizzes.map(q => ({ ...p, ...q })));
                setCurrentQuizzes(filtered);
                setCurrentIndex(0);
                setView('STUDY');
            };

            const handleNext = () => {
                setShowAnswer(false);
                setUserInput("");
                if (currentIndex < currentQuizzes.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                } else {
                    speak("Course complete", 'en-US');
                    setView('HOME');
                }
            };

            // 홈 화면 컴포넌트
            const HomeView = () => (
                <div className="h-screen flex flex-col px-8 py-12 page-transition">
                    <header className="mb-16 text-center">
                        <h1 className="font-heading text-5xl font-black text-slate-900 tracking-tighter mb-2">CORE<span className="text-blue-600">30</span></h1>
                        <p className="text-slate-400 font-bold text-[10px] tracking-[0.2em] uppercase">English Pattern Coach</p>
                    </header>
                    
                    <div className="flex-1 flex flex-col gap-4">
                        <button onClick={() => handleMenuClick('ALL', 'Full Course')} className="group relative bg-slate-900 text-white p-8 rounded-[2rem] overflow-hidden transition-all active:scale-95 shadow-2xl shadow-slate-200">
                            <div className="relative z-10 flex flex-col items-start text-left">
                                <span className="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">In Order</span>
                                <span className="text-2xl font-black italic">Full Course</span>
                            </div>
                            <i className="fas fa-arrow-right absolute right-8 bottom-8 text-slate-700 group-hover:text-blue-500 transition-colors"></i>
                        </button>

                        <button onClick={() => handleMenuClick('PART_MENU', 'Part Focused')} className="group relative bg-white border border-slate-100 p-8 rounded-[2rem] overflow-hidden transition-all active:scale-95 shadow-xl shadow-slate-100">
                            <div className="relative z-10 flex flex-col items-start text-left">
                                <span className="text-[10px] font-bold text-blue-500 mb-1 uppercase tracking-widest">Selection</span>
                                <span className="text-2xl font-black text-slate-800">Part Focused</span>
                            </div>
                            <i className="fas fa-layer-group absolute right-8 bottom-8 text-slate-100 group-hover:text-blue-500 transition-colors"></i>
                        </button>

                        <button onClick={() => handleMenuClick('RANDOM', 'Random Test')} className="group relative bg-white border border-slate-100 p-8 rounded-[2rem] overflow-hidden transition-all active:scale-95 shadow-xl shadow-slate-100">
                            <div className="relative z-10 flex flex-col items-start text-left">
                                <span className="text-[10px] font-bold text-orange-500 mb-1 uppercase tracking-widest">Challenge</span>
                                <span className="text-2xl font-black text-slate-800 italic">Random Test</span>
                            </div>
                            <i className="fas fa-shuffle absolute right-8 bottom-8 text-slate-100 group-hover:text-orange-500 transition-colors"></i>
                        </button>
                    </div>
                </div>
            );

            // 파트 선택 화면 컴포넌트
            const PartSelectView = () => (
                <div className="h-screen flex flex-col px-8 py-12 page-transition">
                    <header className="mb-10 flex items-center gap-4">
                        <button onClick={() => setView('HOME')} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600"><i className="fas fa-chevron-left"></i></button>
                        <h2 className="text-2xl font-black text-slate-800">Choose Part</h2>
                    </header>
                    <div className="grid grid-cols-1 gap-3">
                        {[
                            { id: 'PART 1', title: 'Actions & Intentions', label: 'Part One' },
                            { id: 'PART 2', title: 'Requests & Politeness', label: 'Part Two' },
                            { id: 'PART 3', title: 'Opinions & Judgments', label: 'Part Three' },
                            { id: 'PART 4', title: 'Situations & Logic', label: 'Part Four' }
                        ].map(p => (
                            <button key={p.id} onClick={() => startPartStudy(p.id, p.label)} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-left flex justify-between items-center active:bg-slate-50 transition-colors">
                                <div>
                                    <p className="text-[10px] font-bold text-blue-600 mb-0.5">{p.id}</p>
                                    <p className="font-bold text-slate-800">{p.title}</p>
                                </div>
                                <i className="fas fa-play text-[10px] text-slate-300"></i>
                            </button>
                        ))}
                    </div>
                </div>
            );

            // 학습/테스트 화면 컴포넌트
            const StudyView = () => {
                const current = currentQuizzes[currentIndex];
                return (
                    <div className="h-screen flex flex-col px-6 py-6 page-transition">
                        <header className="flex justify-between items-center mb-6">
                            <button onClick={() => setView('HOME')} className="text-slate-300 hover:text-slate-800 transition"><i className="fas fa-times text-xl"></i></button>
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{currentIndex + 1} / {currentQuizzes.length}</span>
                        </header>

                        <div className="flex-1 flex flex-col justify-between max-h-[70vh]">
                            <div className="mb-6">
                                <span className="text-[10px] font-bold text-blue-500 block mb-2 tracking-widest uppercase">{current.part}</span>
                                <h3 className="text-2xl font-black text-slate-900 leading-tight mb-2 tracking-tight">{current.pattern}</h3>
                                <p className="text-slate-400 text-sm font-medium italic">{current.desc}</p>
                            </div>

                            <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white text-center shadow-2xl mb-6 flex items-center justify-center min-h-[160px]">
                                <p className="text-2xl font-bold leading-snug tracking-tight">"{current.kr}"</p>
                            </div>

                            <div className="relative flex-1 min-h-[140px]">
                                {showAnswer ? (
                                    <div className="h-full bg-blue-50 rounded-[2.5rem] p-8 border-2 border-blue-100 animate-in zoom-in duration-300">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-blue-600 font-bold text-[10px] tracking-widest uppercase italic">Master Answer</span>
                                            <button onClick={() => speak(current.en)} className="w-10 h-10 rounded-full bg-white text-blue-600 shadow-sm flex items-center justify-center"><i className="fas fa-volume-up"></i></button>
                                        </div>
                                        <p className="text-2xl font-black text-slate-800 tracking-tight leading-tight">{current.en}</p>
                                    </div>
                                ) : (
                                    <div className="h-full relative">
                                        <textarea
                                            className="w-full h-full p-8 rounded-[2.5rem] bg-white border border-slate-100 shadow-inner outline-none resize-none text-xl font-bold text-slate-800 placeholder:text-slate-200 tracking-tight"
                                            placeholder="Speak or type here..."
                                            value={userInput}
                                            onChange={(e) => setUserInput(e.target.value)}
                                        />
                                        <button onClick={startListening} className={`absolute bottom-4 right-4 w-16 h-16 rounded-full flex items-center justify-center shadow-xl transition-all ${isListening ? 'bg-red-500 text-white mic-active' : 'bg-blue-600 text-white'}`}>
                                            <i className={`fas ${isListening ? 'fa-stop' : 'fa-microphone'} text-xl`}></i>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="mt-auto pb-4 pt-6">
                            {!showAnswer ? (
                                <button onClick={() => { setShowAnswer(true); speak(current.en); }} disabled={!userInput} className="w-full bg-slate-900 text-white font-black py-6 rounded-[2rem] shadow-xl disabled:bg-slate-100 disabled:text-slate-300 transition-all active:scale-95 uppercase tracking-widest text-xs">Confirm Answer</button>
                            ) : (
                                <button onClick={handleNext} className="w-full bg-blue-600 text-white font-black py-6 rounded-[2rem] shadow-xl hover:bg-blue-700 transition-all active:scale-95 uppercase tracking-widest text-xs">Continue Next</button>
                            )}
                        </div>
                    </div>
                );
            };

            // 목소리 목록 로드 대기
            useEffect(() => {
                window.speechSynthesis.getVoices();
            }, []);

            return (
                <div className="max-w-md mx-auto">
                    {view === 'HOME' && <HomeView />}
                    {view === 'PART_SELECT' && <PartSelectView />}
                    {(view === 'STUDY' || view === 'TEST') && <StudyView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
